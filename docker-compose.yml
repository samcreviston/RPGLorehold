# Planning note: local infrastructure orchestration placeholders for MongoDB and Meilisearch.
version: "3.9"
services:
  mongodb:
    image: mongo:7
    container_name: rpg-mongodb
    ports:
      - "${MONGO_PORT:-27017}:27017"
    volumes:
      - mongo-data:/data/db
  meilisearch:
    image: getmeili/meilisearch:v1.10
    container_name: rpg-meilisearch
    ports:
      - "${MEILI_HTTP_PORT:-7700}:7700"
    environment:
      MEILI_MASTER_KEY: "${MEILI_MASTER_KEY:-change-me}"
    volumes:
      - meili-data:/meili_data
volumes:
  mongo-data:
  meili-data: